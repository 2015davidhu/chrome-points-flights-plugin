<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlightDeal</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="shell">
      <h1>FlightDeal</h1>
      <p class="lede">Store wallet settings for the Google Flights overlay.</p>
      <form id="settings-form">
        <label>
          API base URL
          <input name="apiBaseUrl" type="url" />
        </label>
        <label>
          Amex MR balance
          <input name="amexBalance" type="number" min="0" />
        </label>
        <label>
          Chase UR balance
          <input name="chaseBalance" type="number" min="0" />
        </label>
        <label>
          Amex value (cents)
          <input name="amexValue" type="number" min="0" step="0.1" />
        </label>
        <label>
          Chase value (cents)
          <input name="chaseValue" type="number" min="0" step="0.1" />
        </label>
        <button type="submit">Save settings</button>
      </form>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
